name: BGDiff
channels:
  - pytorch
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=12.1
  - pip>=23.0  # 显式指定高版本pip，彻底消除警告
  - pip:
      - gradio==3.16.2
      - albumentations==1.3.0
      - opencv-contrib-python==4.9.0.80
      - imageio==2.9.0
      - imageio-ffmpeg==0.4.2
      - pytorch-lightning==2.2
      - omegaconf==2.1.1
      - test-tube>=0.7.5
      - streamlit==1.12.1
      - einops==0.3.0
      - transformers==4.19.2
      - webdataset==0.2.5
      - kornia==0.6
      - open_clip_torch==2.0.2
      - invisible-watermark>=0.1.5
      - streamlit-drawable-canvas==0.8.0
      - torchmetrics==0.7.0
      - timm==0.6.12
      - addict==2.4.0
      - yapf==0.32.0
      - prettytable==3.6.0
      - safetensors==0.2.7
      - tensorboard>=2.10.0  # 核心：添加正式版tensorboard，替代tb-nightly
      - basicsr==1.4.2 --no-deps  # 关键：安装basicsr时忽略自身依赖，避免找tb-nightly